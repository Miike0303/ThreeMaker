<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreeMaker</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #111;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
        position: relative;
      }
      .locale-selector {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: #e6e6f0;
        background: rgba(20, 20, 32, 0.7);
        padding: 6px 10px;
        border-radius: 6px;
        backdrop-filter: blur(4px);
      }
      .locale-selector select {
        font: inherit;
        color: inherit;
        background: #24243a;
        border: 1px solid #3c3c5a;
        border-radius: 4px;
        padding: 2px 6px;
      }
      .camera-mode-indicator {
        /* Bottom-left, not top-left: stats-gl's own overlay (appended by
           main.ts) is a fixed top-left panel and would otherwise visually
           collide with/clip this one. */
        position: fixed;
        bottom: 12px;
        left: 12px;
        z-index: 10;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: #e6e6f0;
        background: rgba(20, 20, 32, 0.7);
        padding: 6px 10px;
        border-radius: 6px;
        backdrop-filter: blur(4px);
        pointer-events: none;
      }
      .status-message {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        font-size: 18px;
        color: #e6e6f0;
        text-align: center;
        padding: 0 24px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

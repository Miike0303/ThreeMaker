<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreeMaker</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #111;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
        position: relative;
      }
      .locale-selector {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: #e6e6f0;
        background: rgba(20, 20, 32, 0.7);
        padding: 6px 10px;
        border-radius: 6px;
        backdrop-filter: blur(4px);
      }
      .locale-selector select {
        font: inherit;
        color: inherit;
        background: #24243a;
        border: 1px solid #3c3c5a;
        border-radius: 4px;
        padding: 2px 6px;
      }
      .camera-mode-indicator {
        /* Bottom-left, not top-left: stats-gl's own overlay (appended by
           main.ts) is a fixed top-left panel and would otherwise visually
           collide with/clip this one. */
        position: fixed;
        bottom: 12px;
        left: 12px;
        z-index: 10;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: #e6e6f0;
        background: rgba(20, 20, 32, 0.7);
        padding: 6px 10px;
        border-radius: 6px;
        backdrop-filter: blur(4px);
        pointer-events: none;
      }
      .debug-panel {
        /* Top-right, below the locale selector (which sits at top:12px and is
           roughly 34px tall including padding). */
        position: fixed;
        top: 54px;
        right: 12px;
        z-index: 10;
        font-family: system-ui, sans-serif;
        font-size: 12px;
        color: #e6e6f0;
        background: rgba(20, 20, 32, 0.7);
        border-radius: 6px;
        backdrop-filter: blur(4px);
        min-width: 190px;
        max-width: 260px;
      }
      .debug-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 6px 10px;
      }
      .debug-panel-title {
        font-weight: 600;
      }
      .debug-panel-toggle {
        font: inherit;
        color: inherit;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0 2px;
        line-height: 1;
      }
      .debug-panel-body {
        padding: 0 10px 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .debug-panel-collapsed .debug-panel-body {
        display: none;
      }
      .debug-panel-values,
      .debug-panel-controls {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .debug-panel-controls-title {
        font-weight: 600;
        margin-top: 2px;
        opacity: 0.85;
      }
      .debug-panel-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .debug-panel-label {
        opacity: 0.75;
      }
      .debug-panel-keys {
        font-family: ui-monospace, 'SF Mono', Consolas, monospace;
        opacity: 0.9;
      }
      .dialogue-overlay {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        width: min(560px, calc(100vw - 48px));
        font-family: system-ui, sans-serif;
        color: #e6e6f0;
        background: rgba(16, 16, 26, 0.9);
        border: 1px solid #3c3c5a;
        border-radius: 8px;
        padding: 14px 18px;
        backdrop-filter: blur(4px);
      }
      .dialogue-overlay-error {
        border-color: #a33;
      }
      .dialogue-speaker {
        font-weight: 600;
        font-size: 13px;
        opacity: 0.85;
        margin-bottom: 4px;
      }
      .dialogue-text {
        font-size: 16px;
        line-height: 1.4;
        white-space: pre-wrap;
      }
      .dialogue-choices {
        list-style: none;
        margin: 10px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .dialogue-choice {
        font-size: 14px;
        padding: 4px 8px;
        border-radius: 4px;
      }
      .dialogue-choice-highlighted {
        background: rgba(120, 140, 255, 0.25);
      }
      .dialogue-hint {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.7;
      }
      .status-message {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        font-size: 18px;
        color: #e6e6f0;
        text-align: center;
        padding: 0 24px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
